name: Rebuild King Musah Media Site

# This runs automatically on GitHub's own servers, not on Claude, not on your
# computer. Whenever data/articles.json changes inside the media folder, it
# regenerates every page and publishes the update automatically — even if
# Claude is unavailable.

on:
  push:
    branches: [ main ]
    paths:
      - 'media/data/articles.json'
      - 'media/generate_site.py'
      - 'media/assets/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rebuild the site from articles.json
        run: |
          cd media
          python3 generate_site.py

      - name: Publish the rebuilt pages
        run: |
          git config user.name "King Musah Media Auto-Build"
          git config user.email "actions@github.com"
          git add media/
          git diff --staged --quiet || git commit -m "Auto-rebuild site from articles.json [skip ci]"
          git push
